seed: 42
device: "cuda"
num_points: 2048
input_channels: 3
num_known_classes: 19
use_negative_class: true
negative_label: 19
num_classes: 20
embedding_dim: 256

label_mapping:
  negative_names: ["negative", "qita", "other", "others", "其他"]
  force_negative_label: 19

data:
  root: "./dataset"
  train_split: "train"
  val_split: "val"
  test_split: "test"

pcd:
  raw_dir: "./raw_pcd_dataset"
  use_intensity: false

augmentation:
  use_jitter: true
  jitter_sigma: 0.01
  jitter_clip: 0.05
  use_random_z_rotation: true
  use_random_dropout: true
  dropout_ratio: 0.1

train:
  epochs: 100
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  optimizer: "adamw"
  use_class_weight: true
  class_weight_max: 10.0
